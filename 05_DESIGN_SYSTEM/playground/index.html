<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MrBrain Design Playground v2</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      :root {
        --bg: #080a0f;
        --panel: rgba(255, 255, 255, 0.08);
        --panel-strong: rgba(255, 255, 255, 0.14);
        --text: #f7f8fb;
        --muted: rgba(247, 248, 251, 0.66);
        --line: rgba(255, 255, 255, 0.14);
        --accent: #34d399;
        --danger: #fb7185;
        --warning: #fbbf24;
        --radius: 16px;
        --space: 24px;
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
        --glass-blur: 18px;
        --motion: 220ms;
        --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 18% 0%, rgba(52, 211, 153, 0.16), transparent 32%),
          radial-gradient(circle at 94% 8%, rgba(148, 163, 184, 0.14), transparent 30%),
          var(--bg);
        color: var(--text);
        font-family: var(--font);
        letter-spacing: 0;
      }

      button {
        font: inherit;
      }

      .shell {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        align-items: center;
        padding: 18px 28px;
        border-bottom: 1px solid var(--line);
        background: rgba(0, 0, 0, 0.18);
        backdrop-filter: blur(18px);
      }

      .brand {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      .logo {
        width: 42px;
        height: 42px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        background: var(--panel-strong);
        border: 1px solid var(--line);
        font-weight: 850;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: 18px;
        line-height: 1.2;
      }

      .sub {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        border-radius: 999px;
        padding: 8px 11px;
        background: rgba(52, 211, 153, 0.14);
        color: var(--accent);
        font-size: 12px;
        font-weight: 750;
      }

      .main {
        display: grid;
        grid-template-columns: minmax(320px, 0.92fr) minmax(0, 1.6fr);
        gap: 22px;
        padding: 24px;
      }

      .panel,
      .choice,
      .preview-card,
      .artifact,
      .token-panel {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel);
        box-shadow: var(--shadow);
        backdrop-filter: blur(var(--glass-blur));
      }

      .panel {
        padding: 22px;
      }

      .question {
        position: sticky;
        top: 24px;
        align-self: start;
      }

      .step {
        color: var(--accent);
        font-size: 12px;
        font-weight: 800;
        margin-bottom: 12px;
        text-transform: uppercase;
      }

      .question h2 {
        font-size: clamp(28px, 4.5vw, 48px);
        line-height: 1.05;
        margin-bottom: 14px;
      }

      .help {
        color: var(--muted);
        line-height: 1.7;
        font-size: 14px;
        margin-bottom: 20px;
      }

      .choices {
        display: grid;
        gap: 10px;
      }

      .choice {
        width: 100%;
        text-align: left;
        padding: 15px;
        color: var(--text);
        cursor: pointer;
        transition: transform 130ms, background var(--motion), border-color var(--motion);
      }

      .choice:hover {
        transform: translateY(-1px);
        background: var(--panel-strong);
      }

      .choice.active {
        border-color: rgba(52, 211, 153, 0.62);
        background: rgba(52, 211, 153, 0.16);
      }

      .choice-label {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        font-weight: 800;
        margin-bottom: 6px;
      }

      .choice p {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.55;
      }

      .nav {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 16px;
      }

      .nav button,
      .decision-button {
        border: 1px solid var(--line);
        border-radius: calc(var(--radius) * 0.72);
        padding: 12px 14px;
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        cursor: pointer;
        transition: transform 130ms, background var(--motion), border-color var(--motion);
      }

      .nav button:hover,
      .decision-button:hover {
        background: var(--panel-strong);
      }

      .nav button:active,
      .decision-button:active {
        transform: scale(0.98);
      }

      .decision-button.primary {
        border-color: transparent;
        background: var(--accent);
        color: #04110c;
        font-weight: 850;
      }

      .preview {
        display: grid;
        gap: 22px;
      }

      .preview-head {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        align-items: flex-end;
      }

      .preview-head h2 {
        font-size: 20px;
      }

      .compare-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .preview-card {
        padding: var(--space);
        min-height: 360px;
        font-family: var(--font);
      }

      .preview-card.selected {
        border-color: rgba(52, 211, 153, 0.64);
      }

      .preview-title {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 18px;
      }

      .mock-phone {
        border: 1px solid var(--line);
        border-radius: calc(var(--radius) + 8px);
        padding: 14px;
        background: rgba(0, 0, 0, 0.18);
      }

      .mock-screen {
        display: grid;
        gap: calc(var(--space) * 0.56);
        min-height: 260px;
      }

      .mock-card {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: calc(var(--space) * 0.68);
        background: var(--panel-strong);
        transition: transform var(--motion), background var(--motion), border-color var(--motion);
      }

      .mock-card:hover {
        transform: translateY(-2px);
      }

      .big {
        font-size: 42px;
        line-height: 1;
        font-weight: 900;
        margin-bottom: 8px;
      }

      .mock-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        padding: 10px 0;
        border-top: 1px solid var(--line);
        color: var(--muted);
        font-size: 13px;
      }

      .button-row {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }

      .mini {
        border: 1px solid var(--line);
        border-radius: calc(var(--radius) * 0.65);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        padding: 10px 8px;
        min-height: 40px;
      }

      .mini.ok {
        background: rgba(52, 211, 153, 0.18);
        color: var(--accent);
      }

      .artifact-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
        font-family: var(--font);
      }

      .artifact {
        padding: 16px;
        min-height: 190px;
      }

      .artifact h3 {
        font-size: 15px;
        margin-bottom: 8px;
      }

      .artifact p,
      .token-panel p {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.55;
      }

      .line-bubble {
        margin-top: 10px;
        border-radius: 14px;
        padding: 10px 12px;
        background: rgba(255, 255, 255, 0.08);
        font-size: 13px;
        line-height: 1.55;
      }

      .checks {
        display: grid;
        gap: 8px;
        margin-top: 12px;
      }

      .check {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
      }

      .box {
        width: 18px;
        height: 18px;
        border: 1px solid var(--line);
        border-radius: 5px;
        display: grid;
        place-items: center;
        color: var(--accent);
      }

      .token-panel {
        padding: 18px;
      }

      pre {
        margin: 14px 0 0;
        white-space: pre-wrap;
        overflow: auto;
        max-height: 260px;
        padding: 14px;
        border-radius: calc(var(--radius) * 0.75);
        border: 1px solid var(--line);
        background: rgba(0, 0, 0, 0.24);
        color: var(--muted);
        font: 12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }

      .progress {
        display: flex;
        gap: 6px;
        margin-top: 18px;
      }

      .dot {
        height: 7px;
        flex: 1;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.1);
      }

      .dot.done {
        background: var(--accent);
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 1ms !important;
          transition-duration: 1ms !important;
          scroll-behavior: auto !important;
        }
      }

      @media (max-width: 980px) {
        .main,
        .compare-grid,
        .artifact-grid {
          grid-template-columns: 1fr;
        }

        .question {
          position: relative;
          top: auto;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useMemo, useState } = React;

      const QUESTIONS = [
        {
          id: "spacing",
          token: "spacing",
          title: "余白はどちらが気持ちいいですか？",
          help: "情報を詰めて速く見るか、ゆったり呼吸できる余白にするかを選びます。",
          choices: [
            { id: "A", label: "A: しっかり詰まった印象", value: "compact", note: "業務画面として速く見える。情報密度が高い。" },
            { id: "B", label: "B: ゆったり呼吸する印象", value: "relaxed", note: "Human Agent Missionや承認画面で疲れにくい。" },
          ],
        },
        {
          id: "radius",
          token: "radius",
          title: "どちらの丸みが好きですか？",
          help: "しっかりした業務感か、やわらかく安心できる印象かを選びます。",
          choices: [
            { id: "A", label: "A: しっかりした印象", value: 10, note: "硬めで、情報管理ツールらしい。" },
            { id: "B", label: "B: やわらかい印象", value: 18, note: "触りやすく、承認体験が軽く感じる。" },
          ],
        },
        {
          id: "motion",
          token: "motionSpeed",
          title: "この動きは心地いいですか？",
          help: "操作した時の反応速度を選びます。速すぎても遅すぎても疲れます。",
          choices: [
            { id: "A", label: "A: 速い", value: "fast", note: "反応が速い。業務では良いが少し硬い可能性。" },
            { id: "B", label: "B: ちょうどいい", value: "normal", note: "状態変化が分かりやすく、待たされ感も少ない。" },
            { id: "C", label: "C: 遅い", value: "slow", note: "落ち着くが、毎日使うと重く感じる可能性。" },
          ],
        },
        {
          id: "glass",
          token: "glass",
          title: "どちらが見やすいですか？",
          help: "透明感の気持ちよさと、文字の読みやすさのバランスを選びます。",
          choices: [
            { id: "A", label: "A: 透明感あり", value: "medium", note: "世界観は出る。Web/App向け。" },
            { id: "B", label: "B: はっきり", value: "off", note: "読みやすい。A4、Mail、業務確認向け。" },
          ],
        },
        {
          id: "typography",
          token: "typography",
          title: "どちらが読みやすいですか？",
          help: "毎日見る文字として、実用性を優先するか、少し雰囲気を足すかを選びます。",
          choices: [
            { id: "A", label: "A: 実用的", value: "system", note: "Inter / SF系。読みやすく、業務画面に強い。" },
            { id: "B", label: "B: 少し雰囲気がある", value: "display", note: "Playfair系を限定使用。エレガント寄りなので保留候補。" },
          ],
        },
      ];

      const DEFAULT_TOKENS = {
        spacing: "relaxed",
        radius: 18,
        motionSpeed: "normal",
        glass: "medium",
        typography: "system",
      };

      function tokenToCss(tokens) {
        const space = tokens.spacing === "compact" ? 16 : tokens.spacing === "relaxed" ? 30 : 24;
        const speed = tokens.motionSpeed === "fast" ? "140ms" : tokens.motionSpeed === "slow" ? "320ms" : "220ms";
        const blur = tokens.glass === "off" ? "0px" : "18px";
        const panel = tokens.glass === "off" ? "rgba(255,255,255,.12)" : "rgba(255,255,255,.08)";
        const font = tokens.typography === "display"
          ? "Playfair Display, Georgia, serif"
          : "Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";

        return {
          "--space": `${space}px`,
          "--radius": `${tokens.radius}px`,
          "--motion": speed,
          "--glass-blur": blur,
          "--panel": panel,
          "--font": font,
        };
      }

      function makeCandidate(base, token, value) {
        return { ...base, [token]: value };
      }

      function PreviewCard({ label, tokens, selected }) {
        const style = tokenToCss(tokens);

        return (
          <article className={`preview-card ${selected ? "selected" : ""}`} style={style}>
            <div className="preview-title">
              <div>
                <h3>{label}</h3>
                <p className="sub">Mobile Approval Preview</p>
              </div>
              {selected && <span className="badge">選択中</span>}
            </div>
            <div className="mock-phone">
              <div className="mock-screen">
                <div className="mock-card">
                  <p className="sub">HOTEL JOY</p>
                  <div className="big">4</div>
                  <p className="sub">承認待ちの重要Action</p>
                </div>
                <div className="mock-card">
                  <div className="mock-row"><span>Human Agent Mission</span><strong>Ready</strong></div>
                  <div className="mock-row"><span>料金表Evidence</span><strong style={{ color: "var(--warning)" }}>Review</strong></div>
                </div>
                <div className="button-row">
                  <button className="mini ok">OK</button>
                  <button className="mini">修正</button>
                  <button className="mini">保留</button>
                  <button className="mini">却下</button>
                </div>
              </div>
            </div>
          </article>
        );
      }

      function ArtifactPreview({ tokens }) {
        const style = tokenToCss(tokens);

        return (
          <div className="artifact-grid" style={style}>
            <article className="artifact">
              <h3>LINE</h3>
              <p>短い文、余白、安心文で動けるか。</p>
              <div className="line-bubble">今日お願いしたいのは、PCまわりの写真だけです。</div>
              <div className="line-bubble">分からなければ写真だけでOKです。</div>
            </article>
            <article className="artifact">
              <h3>Human Agent Mission</h3>
              <p>現場で止まらず進めるか。</p>
              <div className="checks">
                <div className="check"><span className="box">✓</span> PC裏全体を撮る</div>
                <div className="check"><span className="box">✓</span> キーボード全体を撮る</div>
                <div className="check"><span className="box"></span> 配線は抜かない</div>
              </div>
            </article>
            <article className="artifact">
              <h3>Dashboard</h3>
              <p>数字が主役で、異常だけ見えるか。</p>
              <div className="mock-row"><span>未確認</span><strong>12</strong></div>
              <div className="mock-row"><span>承認待ち</span><strong>4</strong></div>
              <div className="mock-row"><span>要確認</span><strong style={{ color: "var(--warning)" }}>2</strong></div>
            </article>
          </div>
        );
      }

      function App() {
        const [step, setStep] = useState(0);
        const [tokens, setTokens] = useState(DEFAULT_TOKENS);
        const [decisions, setDecisions] = useState([]);
        const current = QUESTIONS[step];
        const selected = current.choices.find((choice) => tokens[current.token] === choice.value) || current.choices[0];

        const candidates = current.choices.map((choice) => ({
          ...choice,
          tokens: makeCandidate(tokens, current.token, choice.value),
        }));

        const tokenJson = useMemo(() => JSON.stringify({
          status: "temporary_design_token_candidate",
          source: "Design Playground v2",
          decisions,
          tokens,
          note: "まだ正本ではありません。承認後にDesign Systemへ昇格します。",
        }, null, 2), [tokens, decisions]);

        function choose(choice) {
          const nextTokens = makeCandidate(tokens, current.token, choice.value);
          setTokens(nextTokens);
          setDecisions((items) => {
            const next = items.filter((item) => item.question !== current.id);
            return [...next, {
              question: current.id,
              selected: choice.id,
              label: choice.label,
              token: current.token,
              value: choice.value,
            }];
          });
        }

        function next() {
          setStep((value) => Math.min(QUESTIONS.length - 1, value + 1));
        }

        function prev() {
          setStep((value) => Math.max(0, value - 1));
        }

        return (
          <div className="shell">
            <header className="topbar">
              <div className="brand">
                <div className="logo">DP</div>
                <div>
                  <h1>Design Playground v2</h1>
                  <p className="sub">設定画面ではなく、Designを気持ちよく決める場所</p>
                </div>
              </div>
              <span className="badge">Design Decision Experience</span>
            </header>

            <main className="main">
              <section className="panel question">
                <div className="step">Question {step + 1} / {QUESTIONS.length}</div>
                <h2>{current.title}</h2>
                <p className="help">{current.help}</p>

                <div className="choices">
                  {current.choices.map((choice) => (
                    <button
                      className={`choice ${selected.id === choice.id ? "active" : ""}`}
                      key={choice.id}
                      onClick={() => choose(choice)}
                    >
                      <div className="choice-label">
                        <span>{choice.label}</span>
                        {selected.id === choice.id && <span>選択中</span>}
                      </div>
                      <p>{choice.note}</p>
                    </button>
                  ))}
                  <button className="choice" onClick={() => choose({ id: "X", label: "どちらも違う", value: tokens[current.token], note: "AIに別案を出してほしい。" })}>
                    <div className="choice-label">
                      <span>どちらも違う</span>
                      <span>再提案</span>
                    </div>
                    <p>この案ではしっくり来ない場合に選ぶ。将来はAIが別案を生成する。</p>
                  </button>
                </div>

                <div className="nav">
                  <button onClick={prev}>前へ</button>
                  <button className="decision-button primary" onClick={next}>次の判断へ</button>
                </div>

                <div className="progress">
                  {QUESTIONS.map((item, index) => (
                    <span className={`dot ${index <= step ? "done" : ""}`} key={item.id}></span>
                  ))}
                </div>
              </section>

              <section className="preview">
                <div className="preview-head">
                  <div>
                    <h2>変更前 / 変更後 Preview</h2>
                    <p className="sub">専門用語ではなく、見た感覚で選ぶ。</p>
                  </div>
                  <span className="badge">{selected.label}</span>
                </div>

                <div className="compare-grid">
                  {candidates.map((candidate) => (
                    <PreviewCard
                      key={candidate.id}
                      label={candidate.label}
                      tokens={candidate.tokens}
                      selected={selected.id === candidate.id}
                    />
                  ))}
                </div>

                <div>
                  <div className="preview-head">
                    <div>
                      <h2>Artifact Preview</h2>
                      <p className="sub">選んだ方向がLINE / Mission / Dashboardでどう見えるか。</p>
                    </div>
                  </div>
                  <ArtifactPreview tokens={tokens} />
                </div>

                <div className="token-panel">
                  <h2>あなたの暫定Design Token</h2>
                  <p>これはまだ正本ではありません。最後に承認したものだけDesign Systemへ戻します。</p>
                  <pre>{tokenJson}</pre>
                </div>
              </section>
            </main>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
